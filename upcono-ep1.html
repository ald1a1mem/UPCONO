<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">

<!-- 📱 手機優化 -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- 🖼️ 網站 icon -->
<link rel="icon" type="image/png" href="icon.png">

<title>
UP CONO 開張！邀請到的第一組客人是~ %TEAM 🐺：「決定要把開幕式玩到最嗨」
</title>

<style>

body {
  background: #111;
  color: white;
  text-align: center;
  font-family: sans-serif;
  margin: 0;
}

/* 🔥 主色 */
:root {
  --main-color: #5698c3;
}

/* 標題 */
#title {
  font-size: 26px;
  margin: 20px;
  font-weight: bold;
}

/* 🔥 上方區域 */
#top-controls {
  margin-bottom: 15px;
}

/* 字幕控制 */
#subtitle-controls button {
  background: var(--main-color);
  color: white;
  border: none;
  padding: 8px 12px;
  margin: 3px;
  cursor: pointer;
  border-radius: 6px;
}

/* ❤️ 點讚區 */
#like-section {
  margin-top: 10px;
}

#likeBtn {
  background: none;
  border: none;
  font-size: 30px;
  cursor: pointer;
  color: #ff4d6d;
}

/* 影片 + 留言區 */
#main-layout {
  display: flex;
  justify-content: center;
  align-items: flex-start;
  gap: 20px;
  flex-wrap: wrap;
}

/* 影片容器 */
#video-container {
  position: relative;
  width: 640px;
  transition: all 0.3s ease;
}

/* 全螢幕 */
#video-container.fullscreen {
  width: 100vw;
  height: 100vh;
}

/* YT播放器 */
#player,
#player iframe {
  width: 100%;
  height: 360px;
}

/* 全螢幕填滿 */
#video-container.fullscreen #player,
#video-container.fullscreen iframe {
  width: 100vw !important;
  height: 100vh !important;
}

/* 字幕 */
#subtitle {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 70%;
  font-family:
    "Arial Rounded MT Bold",
    "微軟正黑體",
    sans-serif;

  color: white;
  background: rgba(0,0,0,0.7);

  padding: 6px 14px;
  border-radius: 8px;

  white-space: pre-line;

  max-width: 90%;
}

/* 全螢幕按鈕 */
#fullscreenBtn {
  display: block;
  margin: 12px auto;

  background: var(--main-color);
  color: white;

  border: none;
  padding: 10px 18px;

  cursor: pointer;
  border-radius: 6px;
}

/* 退出全螢幕 */
#exitFullscreenBtn {
  position: absolute;
  bottom: 10px;
  right: 10px;

  background: rgba(0,0,0,0.7);
  color: white;

  border: 1px solid white;

  padding: 6px 10px;

  cursor: pointer;
  display: none;

  z-index: 10;
}

/* 留言區 */
#comment-section {
  width: 300px;
  background: #1b1b1b;
  border-radius: 10px;
  padding: 15px;
  text-align: left;
}

#comment-title {
  font-size: 20px;
  margin-bottom: 10px;
}

#comment-input {
  width: 100%;
  box-sizing: border-box;
  padding: 10px;
  margin-bottom: 10px;
  border: none;
  border-radius: 6px;
}

#comment-btn {
  width: 100%;
  background: var(--main-color);
  color: white;
  border: none;
  padding: 10px;
  border-radius: 6px;
  cursor: pointer;
}

.comment {
  background: #2a2a2a;
  padding: 10px;
  border-radius: 6px;
  margin-top: 10px;
  word-break: break-word;
}

/* 📱 手機版 */
@media (max-width: 900px) {

  #main-layout {
    flex-direction: column;
    align-items: center;
  }

  #video-container {
    width: 100%;
    max-width: 640px;
  }

  #comment-section {
    width: 90%;
  }

}

@media (max-width: 600px) {

  #title {
    font-size: 18px;
    margin: 10px;
  }

  #subtitle {
    font-size: 120%;
    bottom: 30px;
  }

  button {
    font-size: 16px;
  }

}

</style>
</head>

<body>

<!-- 標題 -->
<div id="title">
UP CONO 開張！邀請到的第一組客人是~ %TEAM 🐺：「決定要把開幕式玩到最嗨」
</div>

<!-- 🔥 控制區 -->
<div id="top-controls">

  <div id="subtitle-controls">
    <button onclick="changeSubtitleSize(0.1)">放大</button>
    <button onclick="changeSubtitleSize(-0.1)">縮小</button>
    <button onclick="resetSubtitleSize()">復原</button>
  </div>

  <!-- ❤️ 點讚 -->
  <div id="like-section">
    <button id="likeBtn">🤍</button>
    <span id="likeCount">0</span>
  </div>

</div>

<!-- 主區 -->
<div id="main-layout">

  <div id="video-container">

    <div id="player"></div>

    <div id="subtitle">字幕載入中...</div>

    <button id="exitFullscreenBtn">退出全螢幕</button>

  </div>

  <!-- 留言 -->
  <div id="comment-section">

    <div id="comment-title">留言區</div>

    <input id="comment-input" placeholder="輸入留言...">

    <button id="comment-btn">發送留言</button>

    <div id="comments"></div>

  </div>

</div>

<button id="fullscreenBtn">全螢幕</button>

<script src="https://www.youtube.com/iframe_api"></script>

<script>

/* 🎬 YouTube */
const videoId = "4_egYOdslfs";
let player = null;
let subtitleSize = 0.7;

function createPlayer() {
  if (!window.YT || !YT.Player) {
    setTimeout(createPlayer, 100);
    return;
  }

  player = new YT.Player("player", {
    height: "360",
    width: "640",
    videoId: videoId,
    playerVars: { fs: 0, controls: 1 }
  });
}

window.onYouTubeIframeAPIReady = createPlayer;

/* 字幕 */
const subtitles = [
  { time: 25, endTime: 28, text: "[SBS 登村洞公共禮堂]" },
  { time: 29, endTime: 30, text: "勁爆 UP" },
  { time: 31, endTime: 32, text: "振奮 歡呼" },
  { time: 32, endTime: 33, text: "能量 爆棚" },
  {
    time: 34,
    endTime: 38,
    text: `[能量爆棚的卡拉OK好去處！]
JUNSEO | 這裡是UPbit Coin Karaoke，為你注入能量`
  }
];

function updateSubtitle() {
  if (!player || !player.getCurrentTime) return;

  const t = player.getCurrentTime();
  let text = "";

  for (let i = 0; i < subtitles.length; i++) {
    if (t >= subtitles[i].time && t <= subtitles[i].endTime) {
      text = subtitles[i].text;
    }
  }

  const el = document.getElementById("subtitle");
  el.innerText = text;
  el.style.fontSize = (subtitleSize * 100) + "%";
}

setInterval(updateSubtitle, 200);

/* 字幕大小 */
function changeSubtitleSize(a) {
  subtitleSize = Math.min(2, Math.max(0.3, subtitleSize + a));
}
function resetSubtitleSize() {
  subtitleSize = 0.7;
}

/* 全螢幕 */
const container = document.getElementById("video-container");
const exitBtn = document.getElementById("exitFullscreenBtn");

document.getElementById("fullscreenBtn").onclick = () => {
  container.requestFullscreen();
};

exitBtn.onclick = () => document.exitFullscreen();

document.addEventListener("fullscreenchange", () => {
  const full = !!document.fullscreenElement;
  container.classList.toggle("fullscreen", full);
  exitBtn.style.display = full ? "block" : "none";
});

/* 留言 */
const commentInput = document.getElementById("comment-input");
const commentBtn = document.getElementById("comment-btn");
const comments = document.getElementById("comments");

commentBtn.onclick = addComment;

function addComment() {
  const text = commentInput.value.trim();
  if (!text) return;

  const div = document.createElement("div");
  div.className = "comment";
  div.innerText = text;

  comments.prepend(div);
  commentInput.value = "";
}

/* ❤️ 點讚系統 */
let likeCount = localStorage.getItem("likeCount")
  ? parseInt(localStorage.getItem("likeCount"))
  : 0;

let liked = localStorage.getItem("liked") === "true";

const likeBtn = document.getElementById("likeBtn");
const likeCountEl = document.getElementById("likeCount");

function updateLikeUI() {
  likeCountEl.innerText = likeCount;
  likeBtn.innerText = liked ? "❤️" : "🤍";
}

updateLikeUI();

likeBtn.onclick = () => {
  liked = !liked;

  if (liked) likeCount++;
  else likeCount = Math.max(0, likeCount - 1);

  localStorage.setItem("likeCount", likeCount);
  localStorage.setItem("liked", liked);

  updateLikeUI();
};

</script>

</body>
</html>
