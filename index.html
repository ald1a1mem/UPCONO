<style>

body {
  background: #111;
  color: white;
  text-align: center;
  font-family: sans-serif;
  margin: 0;
}

:root {
  --main-color: #5698c3;
}

#title {
  font-size: 26px;
  margin: 20px;
  font-weight: bold;
}

#top-controls {
  margin-bottom: 15px;
}

#subtitle-controls button {
  background: var(--main-color);
  color: white;
  border: none;
  padding: 8px 12px;
  margin: 3px;
  cursor: pointer;
  border-radius: 6px;
}

/* ⭐ 影片包住（讓 overlay 在外面） */
#video-wrapper{
  position: relative;
  width: 640px;
  margin: auto;
}

/* 影片容器 */
#video-container {
  position: relative;
  width: 100%;
  transition: all 0.3s ease;
}

#video-container.fullscreen {
  width: 100vw;
  height: 100vh;
}

#player,
#player iframe {
  width: 100%;
  height: 360px;
}

#video-container.fullscreen #player,
#video-container.fullscreen iframe {
  width: 100vw !important;
  height: 100vh !important;
}

/* 字幕 */
#subtitle {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 70%;
  font-family: "Arial Rounded MT Bold","微軟正黑體",sans-serif;
  color: white;
  background: rgba(0,0,0,0.7);
  padding: 6px 14px;
  border-radius: 8px;
  white-space: pre-line;
  max-width: 90%;
}

/* ❤️ + 📊（影片外左下角） */
#video-overlay{
  position: absolute;
  bottom: 10px;
  left: 10px;

  display: flex;
  gap: 12px;
  align-items: center;

  font-size: 14px;
  z-index: 20;
}

/* ❤️ */
#likeBtn{
  background:none;
  border:none;
  font-size:18px;
  cursor:pointer;
  color: var(--main-color);
}

#likeCount{
  color: var(--main-color);
}

/* 📊 */
#view-section{
  display:flex;
  gap:4px;
  align-items:center;
  color: var(--main-color);
}

/* 按鈕 */
#fullscreenBtn {
  display: block;
  margin: 12px auto;
  background: var(--main-color);
  color: white;
  border: none;
  padding: 10px 18px;
  cursor: pointer;
  border-radius: 6px;
}

#exitFullscreenBtn {
  position: absolute;
  bottom: 10px;
  right: 10px;
  background: rgba(0,0,0,0.7);
  color: white;
  border: 1px solid white;
  padding: 6px 10px;
  cursor: pointer;
  display: none;
}

/* 留言 */
#comment-section {
  width: 300px;
  background: #1b1b1b;
  border-radius: 10px;
  padding: 15px;
  text-align: left;
  margin: 20px auto;
}

#comment-input {
  width: 100%;
  box-sizing: border-box;
  padding: 10px;
  margin-bottom: 10px;
  border: none;
  border-radius: 6px;
}

#comment-btn {
  width: 100%;
  background: var(--main-color);
  color: white;
  border: none;
  padding: 10px;
  border-radius: 6px;
  cursor: pointer;
}

.comment {
  background: #2a2a2a;
  padding: 10px;
  border-radius: 6px;
  margin-top: 10px;
}

</style>
</head>

function updateSubtitle(){
  if(!player||!player.getCurrentTime)return;

  const t = player.getCurrentTime();
  let text = "";

  for(let i=0;i<subtitles.length;i++){
    if(t >= subtitles[i].time){
      text = subtitles[i].text;
    }
  }

  document.getElementById("subtitle").innerText = text;
}
setInterval(updateSubtitle,200);

/* ❤️ 防刷（每人一次 + 冷卻） */
let likeCount = parseInt(localStorage.getItem("likeCount")||"0");
let liked = localStorage.getItem("liked")==="true";
let lastClick = parseInt(localStorage.getItem("likeTime")||"0");

const likeBtn = document.getElementById("likeBtn");
const likeCountEl = document.getElementById("likeCount");

function updateLike(){
  likeCountEl.innerText = likeCount;
  likeBtn.innerText = liked ? "❤️" : "🤍";
}
updateLike();

likeBtn.onclick = () => {
  const now = Date.now();

  if(liked){
    alert("你已經按過了");
    return;
  }

  if(now - lastClick < 3000){
    alert("請稍等一下再點");
    return;
  }

  liked = true;
  likeCount++;

  localStorage.setItem("likeCount",likeCount);
  localStorage.setItem("liked","true");
  localStorage.setItem("likeTime",now);

  lastClick = now;

  updateLike();
};

/* 📊 觀看數 */
let viewed = localStorage.getItem("viewed");
let viewCount = parseInt(localStorage.getItem("viewCount")||"0");

  viewCount++;
  localStorage.setItem("viewCount",viewCount);
  localStorage.setItem("viewed","true");
}

document.getElementById("viewCount").innerText = viewCount;
