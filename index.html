<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" type="image/png" href="icon.png">

<title>
UP CONO 開張！邀請到的第一組客人是~ %TEAM 🐺：「決定要把開幕式玩到最嗨」
</title>

<style>
body {
  background: #111;
  color: white;
  text-align: center;
  font-family: sans-serif;
  margin: 0;
}

:root {
  --main-color: #5698c3;
}

#title {
  font-size: 26px;
  margin: 20px;
  font-weight: bold;
}

#top-controls {
  margin-bottom: 15px;
}

#subtitle-controls button {
  background: var(--main-color);
  color: white;
  border: none;
  padding: 8px 16px;
  margin: 3px;
  border-radius: 6px;
  cursor: pointer;
  transition: 0.3s;
  font-weight: bold;
}

#subtitle-controls button:hover {
  filter: brightness(1.2);
}

/* 影片外框 */
#video-wrapper {
  position: relative;
  width: 640px;
  margin: auto;
}

/* 影片容器 */
#video-container {
  position: relative;
  width: 100%;
  background: black;
}

#player,
#player iframe {
  width: 100%;
  height: 360px;
  display: block;
}

/* 字幕樣式 */
#subtitle {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 18px;
  font-family: "Arial Rounded MT Bold","微軟正黑體",sans-serif;
  color: white;
  background: rgba(0,0,0,0.7);
  padding: 6px 14px;
  border-radius: 8px;
  white-space: pre-line;
  max-width: 90%;
  pointer-events: none;
  z-index: 10;
}

/* 退出全螢幕按鈕 (全螢幕時才顯示) */
#exitFsBtn {
  display: none; /* 平時隱藏 */
  position: absolute;
  right: 20px;
  bottom: 20px;
  background: var(--main-color);
  color: white;
  border: none;
  padding: 10px 18px;
  border-radius: 6px;
  cursor: pointer;
  font-weight: bold;
  z-index: 20;
}

/* 底部列：全螢幕按鈕移至中央 */
#bottom-bar {
  width: 640px;
  margin: auto;
  display: flex;
  justify-content: center; /* 置中 */
  align-items: center;
  margin-top: 15px;
}

#fullscreenBtn {
  background: var(--main-color);
  color: white;
  border: none;
  padding: 10px 30px;
  border-radius: 6px;
  cursor: pointer;
  font-weight: bold;
  transition: 0.3s;
}

#fullscreenBtn:hover {
  filter: brightness(1.2);
}

/* 全螢幕狀態下的影片樣式調整 */
#video-container:fullscreen #player { height: 100vh; }
#video-container:fullscreen #subtitle { font-size: 4vh; bottom: 10vh; }
#video-container:fullscreen #exitFsBtn { display: block; }
</style>
</head>

<body>

<div id="title">
UP CONO 開張！邀請到的第一組客人是~ %TEAM 🐺：「決定要把開幕式玩到最嗨」
</div>

<div id="top-controls">
  <div id="subtitle-controls">
    <button onclick="changeFontSize(2)">放大</button>
    <button onclick="changeFontSize(-2)">縮小</button>
    <button onclick="resetFontSize()">復原</button>
  </div>
</div>

<div id="video-wrapper">
  <!-- 全螢幕目標容器 -->
  <div id="video-container">
    <div id="player"></div>
    <div id="subtitle">字幕載入中...</div>
    <!-- 右下角的退出按鈕 -->
    <button id="exitFsBtn" onclick="exitFullScreen()">退出全螢幕</button>
  </div>

  <div id="bottom-bar">
    <button id="fullscreenBtn" onclick="enterFullScreen()">全螢幕</button>
  </div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
const videoId = "4_egYOdslfs";
let player = null;

function createPlayer(){
  if(!window.YT || !YT.Player){
    setTimeout(createPlayer,100);
    return;
  }
  player = new YT.Player("player", {
    height: "360",
    width: "640",
    videoId: videoId,
    playerVars: { fs: 0, controls: 1, rel: 0, modestbranding: 1 }
  });
}
window.onYouTubeIframeAPIReady = createPlayer;

const subtitles = [
  { time: 25, text: "[SBS 登村洞公共禮堂]" },
  { time: 29, text: "勁爆 UP" },
  { time: 31, text: "振奮 歡呼" },
  { time: 32, text: "能量 爆棚" },
  { time: 34, text: `[能量爆棚的卡拉OK好去處！]\nJUNSEO | 這裡是UPbit Coin Karaoke，為你注入能量` },
  { time: 39, text: "JUNSEO | UP CONO" },
  { time: 40, text: "SANGWON | 哇嗚" },
  { time: 41, text: "SANGWON | UP CONO" },
  { time: 42, text: "JUNSEO | UP CONO" },
  { time: 43, text: "SANGWON | 你好，我們我們是卡拉OK的兼職生MC" },
  { time: 45, text: "SANGWON | 我是 ALPHA DRIVE ONE 的 SANGWON" },
  { time: 47, text: "JUNSEO | 我是 ALPHA DRIVE ONE 的 JUNSEO" },
  { time: 49, text: "[帥氣的兼職生 SANGWON & JUNSEO，正式入職]" },
  { time: 52, text: `[找到工作了]\nSANGWON | 入職！` },
  { time: 53, text: "JUNSEO | 入職！非常恭喜你" },
  { time: 55, text: "JUNSEO | 這是我們出道以來第一次獲得節目的固定MC" },
  { time: 57, text: `[恭喜出道以來首次擔任固定MC]\nJUNSEO | 這是我們出道以來第一次獲得節目的固定MC` },
  { time: 59, text: "真是莫大的榮幸" },
  { time: 61, text: `[喜歡]\n我們會非常努力的` },
  { time: 63, text: `[馬上開始MC入職儀式]\nJUNSEO | 給我們UP節奏！` },
  { time: 110, text: "那個道具真的大大提升了氛圍？" }
];

function updateSubtitle(){
  if(!player || !player.getCurrentTime || typeof player.getCurrentTime !== 'function') return;
  const t = player.getCurrentTime();
  let text = "";
  for(let i=0; i<subtitles.length; i++){
    if(t >= subtitles[i].time) text = subtitles[i].text;
  }
  const subEl = document.getElementById("subtitle");
  if(text === "") {
      subEl.style.display = "none";
  } else {
      subEl.style.display = "block";
      subEl.innerText = text;
  }
}
setInterval(updateSubtitle, 200);

/* 字幕縮放 */
let currentFontSize = 18;
function changeFontSize(delta) {
  currentFontSize += delta;
  document.getElementById("subtitle").style.fontSize = currentFontSize + "px";
}
function resetFontSize() {
  currentFontSize = 18;
  document.getElementById("subtitle").style.fontSize = "18px";
}

/* 全螢幕功能邏輯 */
function enterFullScreen() {
  const elem = document.getElementById("video-container");
  if (elem.requestFullscreen) {
    elem.requestFullscreen();
  } else if (elem.webkitRequestFullscreen) {
    elem.webkitRequestFullscreen();
  } else if (elem.msRequestFullscreen) {
    elem.msRequestFullscreen();
  }
}

function exitFullScreen() {
  if (document.exitFullscreen) {
    document.exitFullscreen();
  } else if (document.webkitExitFullscreen) {
    document.webkitExitFullscreen();
  } else if (document.msExitFullscreen) {
    document.msExitFullscreen();
  }
}

// 監聽全螢幕狀態，調整字幕大小適應大螢幕
document.addEventListener('fullscreenchange', () => {
  const subEl = document.getElementById("subtitle");
  if (document.fullscreenElement) {
    // 進入全螢幕時，字幕自動放大一點點
    subEl.style.fontSize = (currentFontSize * 1.5) + "px";
  } else {
    // 退出後恢復原本大小
    subEl.style.fontSize = currentFontSize + "px";
  }
});
</script>

</body>
</html>
