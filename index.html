<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>字幕系統</title>

<style>
body {
  background: #111;
  color: white;
  text-align: center;
  font-family: sans-serif;
}

#subtitle {
  margin-top: 20px;
  font-size: 26px;
  color: white;

  /* ⭐ 70% 黑底 */
  background: rgba(0, 0, 0, 0.7);
  display: inline-block;
  padding: 6px 12px;
  border-radius: 8px;
}
</style>
</head>

<body>

<h2>字幕播放器</h2>

<div id="player"></div>
<div id="subtitle">字幕載入中...</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
let player;

/* ⭐ 只改這裡：貼 YouTube 連結 */
const youtubeUrl = "https://youtu.be/4_egYOdslfs?si=CfHDRvS_UfdQfQPy";

/* ⭐ 抓 videoId */
function getVideoId(url) {
  const u = new URL(url);
  if (u.hostname.includes("youtube.com")) return u.searchParams.get("v");
  if (u.hostname === "youtu.be") return u.pathname.slice(1);
  return null;
}

const videoId = getVideoId(youtubeUrl);

/* ⭐ 建立播放器 */
function onYouTubeIframeAPIReady() {
  player = new YT.Player("player", {
    height: "360",
    width: "640",
    videoId: videoId
  });
}

/* ⭐ 字幕（完全不動） */
const subtitles = [
  { time: 25, text: "[SBS 登村洞公共禮堂]" },
  { time: 29, text: "SANGWON：勁爆" },
  { time: 30, text: "JUNSEO：UP" }
];

/* ⭐ 更新字幕（完全不動） */
function updateSubtitle() {
  if (!player || !player.getCurrentTime) return;

  const t = player.getCurrentTime();
  let text = "";

  for (let i = 0; i < subtitles.length; i++) {
    if (t >= subtitles[i].time) {
      text = subtitles[i].text;
    }
  }

  document.getElementById("subtitle").innerText = text;
}

setInterval(updateSubtitle, 500);
</script>

</body>
</html>
