<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>字幕系統</title>

<style>
body {
  background: #111;
  color: white;
  text-align: center;
  font-family: sans-serif;
}

#subtitle {
  margin-top: 20px;
  font-size: 26px;
  color: #00ffcc;
}
</style>
</head>

<body>

<h2>字幕播放器</h2>

<div id="player"></div>
<div id="subtitle">字幕載入中...</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
let player;

/* ⭐ 只改這裡：貼 YouTube 連結 */
const youtubeUrl = "https://youtu.be/ytUfCqnBFvg?si=GDEU1KCwMVMK2VSZ";

/* ⭐ 抓 videoId */
function getVideoId(url) {
  const u = new URL(url);
  if (u.hostname.includes("youtube.com")) return u.searchParams.get("v");
  if (u.hostname === "youtu.be") return u.pathname.slice(1);
  return null;
}

const videoId = getVideoId(youtubeUrl);

/* ⭐ 建立播放器 */
function onYouTubeIframeAPIReady() {
  player = new YT.Player("player", {
    height: "360",
    width: "640",
    videoId: videoId
  });
}

/* ⭐ 超簡單字幕（直接寫這裡） */
const subtitles = [
  { time: 0, text: "LEO：向大家問好/nONE DESTINY" },
  { time: 1, text: "DRIVE TO THE TOP" },
  { time: 2, text: "大家好，我們是ALPHA DRIVE ONE" }
];

/* ⭐ 更新字幕 */
function updateSubtitle() {
  if (!player || !player.getCurrentTime) return;

  const t = player.getCurrentTime();
  let text = "";

  for (let i = 0; i < subtitles.length; i++) {
    if (t >= subtitles[i].time) {
      text = subtitles[i].text;
    }
  }

  document.getElementById("subtitle").innerText = text;
}

setInterval(updateSubtitle, 500);
</script>

</body>
</html>
