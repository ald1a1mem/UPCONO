<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>字幕翻譯播放器</title>

<style>
body {
  background: #111;
  color: white;
  text-align: center;
  font-family: sans-serif;
}

/* 標題 */
#title {
  font-size: 24px;
  margin: 20px;
}

/* 右上角彈幕按鈕 */
#danmuToggle {
  position: absolute;
  top: 20px;
  right: 20px;
  background: gray;
  color: black;
  border: none;
  padding: 6px 12px;
  cursor: pointer;
}

/* 影片容器 */
#video-container {
  position: relative;
  width: 640px;
  margin: auto;
}

/* 字幕（覆蓋在影片上） */
#subtitle {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 24px;
  font-family: "Arial Rounded MT Bold", "微軟正黑體", sans-serif;
  color: white;
  background: rgba(0,0,0,0.7);
  padding: 6px 12px;
  border-radius: 6px;
  display: inline-block;
  white-space: nowrap;
}

/* 彈幕 */
.danmu {
  position: absolute;
  white-space: nowrap;
  font-size: 20px;
  color: white;
  pointer-events: none;
  animation: moveDanmu 6s linear forwards;
}

@keyframes moveDanmu {
  from { left: 100%; }
  to { left: -100%; }
}

/* 全螢幕按鈕 */
#fullscreenBtn {
  margin-top: 10px;
  background: gray;
  color: black;
  border: none;
  padding: 8px 16px;
  cursor: pointer;
}
</style>
</head>

<body>

<div id="title">字幕翻譯播放器</div>
<button id="danmuToggle">彈幕：開</button>

<div id="video-container">
  <div id="player"></div>
  <div id="subtitle">字幕載入中...</div>
</div>

<button id="fullscreenBtn">全螢幕</button>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
let player;
let danmuOn = true;

/* YouTube 連結 */
const youtubeUrl = "https://youtu.be/ytUfCqnBFvg";

/* 取得ID */
function getVideoId(url) {
  const u = new URL(url);
  if (u.hostname.includes("youtube.com")) return u.searchParams.get("v");
  if (u.hostname === "youtu.be") return u.pathname.slice(1);
}

const videoId = getVideoId(youtubeUrl);

/* 建立播放器 */
function onYouTubeIframeAPIReady() {
  player = new YT.Player("player", {
    height: "360",
    width: "640",
    videoId: videoId
  });
}

/* 字幕資料 */
const subtitles = [
  { time: 0, text: "LEO：向大家問好 / ONE DESTINY" },
  { time: 2, text: "DRIVE TO THE TOP" },
  { time: 4, text: "大家好，我們是ALPHA DRIVE ONE" }
];

/* 彈幕資料 */
const danmus = [
  { time: 1, text: "好帥！！！" },
  { time: 3, text: "這句超燃🔥" }
];

/* 更新字幕 */
function updateSubtitle() {
  if (!player || !player.getCurrentTime) return;

  const t = player.getCurrentTime();
  let text = "";

  for (let i = 0; i < subtitles.length; i++) {
    if (t >= subtitles[i].time) {
      text = subtitles[i].text;
    }
  }

  document.getElementById("subtitle").innerText = text;
}

/* 彈幕生成 */
function updateDanmu() {
  if (!danmuOn || !player) return;

  const t = Math.floor(player.getCurrentTime());

  danmus.forEach(d => {
    if (d.time === t) {
      const el = document.createElement("div");
      el.className = "danmu";
      el.innerText = d.text;
      el.style.top = Math.random() * 200 + "px";

      document.getElementById("video-container").appendChild(el);

      setTimeout(() => el.remove(), 6000);
    }
  });
}

/* 定時更新 */
setInterval(() => {
  updateSubtitle();
  updateDanmu();
}, 500);

/* 全螢幕 */
document.getElementById("fullscreenBtn").onclick = () => {
  const elem = document.getElementById("video-container");
  if (elem.requestFullscreen) {
    elem.requestFullscreen();
  }
};

/* 彈幕開關 */
document.getElementById("danmuToggle").onclick = () => {
  danmuOn = !danmuOn;
  document.getElementById("danmuToggle").innerText =
    danmuOn ? "彈幕：開" : "彈幕：關";
};
</script>

</body>
</html>
